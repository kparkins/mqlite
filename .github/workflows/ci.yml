name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ---------------------------------------------------------------------------
  # Build + Test
  # ---------------------------------------------------------------------------
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build (all features)
        run: cargo build --all-features --verbose

      - name: Test (all features)
        run: cargo test --all-features --verbose

      - name: Test (no default features)
        run: cargo test --no-default-features --verbose

  # ---------------------------------------------------------------------------
  # Clippy â€” warnings-as-errors + no-panic enforcement
  # ---------------------------------------------------------------------------
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Clippy â€” all warnings as errors
        run: cargo clippy --all-features -- -D warnings

      - name: Clippy â€” no-panic enforcement
        # Enforces ux.md constraint #7: no panics in library code.
        # All failures must propagate as Result::Err â€” embedded/IoT users
        # cannot tolerate library panics.
        run: >
          cargo clippy --all-features --
          -D clippy::unwrap_used
          -D clippy::expect_used
          -D clippy::panic

  # ---------------------------------------------------------------------------
  # Format check
  # ---------------------------------------------------------------------------
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable + rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  # ---------------------------------------------------------------------------
  # Pure-Rust verification â€” no C compilation in the dependency tree
  # ---------------------------------------------------------------------------
  pure-rust:
    name: Pure-Rust Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check for C build dependency (cc crate)
        run: |
          if cargo tree --all-features -i cc 2>/dev/null | grep -q .; then
            echo "âťŚ 'cc' crate found in dependency tree â€” C code detected!"
            echo "   mqlite must remain pure-Rust for embedded and IoT targets."
            cargo tree --all-features -i cc
            exit 1
          fi
          echo "âś“ No C build dependencies (cc crate not present)"

      - name: Check workspace for cc::Build in build scripts
        run: |
          BUILD_SCRIPTS=$(find . -name 'build.rs' -not -path './target/*' 2>/dev/null)
          if [ -n "$BUILD_SCRIPTS" ]; then
            BAD=$(echo "$BUILD_SCRIPTS" | xargs grep -l 'cc::Build' 2>/dev/null || true)
            if [ -n "$BAD" ]; then
              echo "âťŚ build.rs files invoking cc::Build found:"
              echo "$BAD"
              exit 1
            fi
          fi
          echo "âś“ No build scripts invoke cc::Build"

  # ---------------------------------------------------------------------------
  # Cross-compilation â€” P0 target matrix
  # ---------------------------------------------------------------------------
  cross:
    name: Cross-compile (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux native
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest

          # Linux cross (aarch64)
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            apt_pkg: gcc-aarch64-linux-gnu

          # macOS native (Apple Silicon)
          - target: aarch64-apple-darwin
            os: macos-latest

          # macOS Intel (cross-compile from Apple Silicon runner)
          - target: x86_64-apple-darwin
            os: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable) + target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: cross-${{ matrix.target }}

      - name: Install cross-linker (Linux aarch64 only)
        if: matrix.apt_pkg != ''
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ${{ matrix.apt_pkg }}

      - name: Configure cross-linker env (Linux aarch64 only)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build (all features) for ${{ matrix.target }}
        run: cargo build --all-features --target ${{ matrix.target }}

  # ---------------------------------------------------------------------------
  # Security audit â€” scan dependencies for known vulnerabilities
  # ---------------------------------------------------------------------------
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run cargo audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Benchmarks â€” run on PRs, compare vs baseline, flag >2Ă— regression
  # ---------------------------------------------------------------------------
  bench:
    name: Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run criterion benchmarks
        run: cargo bench --all-features 2>&1 | tee /tmp/criterion_raw.txt

      - name: Convert criterion output to bencher format
        # Extracts mean timings from criterion output and reformats them as
        # the bencher "test â€¦ bench: X ns/iter (+/- Y)" lines that
        # benchmark-action/github-action-benchmark expects.
        run: |
          python3 - <<'PYEOF'
          import re, sys

          with open('/tmp/criterion_raw.txt') as f:
              content = f.read()

          # Criterion outputs lines like:
          #   bench_name      time:   [1.2000 Âµs 1.2050 Âµs 1.2100 Âµs]
          # We extract the middle (mean) value and convert to ns/iter.
          pattern = re.compile(
              r'^([\w/:]+)\s+time:\s+\[\s*[\d.]+\s*\S+\s+([\d.]+)\s*(\S+)\s+[\d.]+\s*\S+\s*\]',
              re.MULTILINE,
          )

          unit_to_ns = {
              'ps': 1e-3, 'ns': 1, 'Âµs': 1e3, 'us': 1e3,
              'ms': 1e6, 's': 1e9,
          }

          lines = []
          for m in pattern.finditer(content):
              name = m.group(1).strip()
              value = float(m.group(2))
              unit = m.group(3)
              ns = int(value * unit_to_ns.get(unit, 1))
              lines.append(f'test {name} ... bench: {ns:,} ns/iter (+/- 0)')

          if not lines:
              # Fallback: emit a placeholder so the action doesn't fail on
              # an empty input when no benchmarks matched.
              lines.append('test placeholder ... bench: 0 ns/iter (+/- 0)')
              print('Warning: no criterion output matched; using placeholder', file=sys.stderr)

          output = '\n'.join(lines) + '\n'
          with open('bench_output.txt', 'w') as f:
              f.write(output)
          print(f'Extracted {len(lines)} benchmark(s)')
          for l in lines:
              print(l)
          PYEOF

      - name: Store & compare benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: cargo
          output-file-path: bench_output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Push results to gh-pages so future PRs have a baseline to compare against.
          auto-push: true
          # Post a PR comment showing the benchmark delta.
          comment-always: true
          # Alert (and fail the job) when any benchmark regresses more than 2Ă—.
          comment-on-alert: true
          alert-threshold: "200%"
          fail-on-alert: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench
