name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ---------------------------------------------------------------------------
  # Build + Test
  # ---------------------------------------------------------------------------
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build (all features)
        run: cargo build --all-features --verbose

      - name: Test (all features)
        run: cargo test --all-features --verbose

      - name: Test (no default features)
        run: cargo test --no-default-features --verbose

  # ---------------------------------------------------------------------------
  # Clippy — warnings-as-errors + no-panic enforcement
  # ---------------------------------------------------------------------------
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Clippy — all warnings as errors
        run: cargo clippy --all-features -- -D warnings

      - name: Clippy — no-panic enforcement
        # Enforces ux.md constraint #7: no panics in library code.
        # All failures must propagate as Result::Err — embedded/IoT users
        # cannot tolerate library panics.
        run: >
          cargo clippy --all-features --
          -D clippy::unwrap_used
          -D clippy::expect_used
          -D clippy::panic

  # ---------------------------------------------------------------------------
  # Format check
  # ---------------------------------------------------------------------------
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable + rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  # ---------------------------------------------------------------------------
  # Pure-Rust verification — no C compilation in the dependency tree
  # ---------------------------------------------------------------------------
  pure-rust:
    name: Pure-Rust Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check for C build dependency (cc crate)
        run: |
          if cargo tree --all-features -i cc 2>/dev/null | grep -q .; then
            echo "❌ 'cc' crate found in dependency tree — C code detected!"
            echo "   mqlite must remain pure-Rust for embedded and IoT targets."
            cargo tree --all-features -i cc
            exit 1
          fi
          echo "✓ No C build dependencies (cc crate not present)"

      - name: Check workspace for cc::Build in build scripts
        run: |
          BUILD_SCRIPTS=$(find . -name 'build.rs' -not -path './target/*' 2>/dev/null)
          if [ -n "$BUILD_SCRIPTS" ]; then
            BAD=$(echo "$BUILD_SCRIPTS" | xargs grep -l 'cc::Build' 2>/dev/null || true)
            if [ -n "$BAD" ]; then
              echo "❌ build.rs files invoking cc::Build found:"
              echo "$BAD"
              exit 1
            fi
          fi
          echo "✓ No build scripts invoke cc::Build"

  # ---------------------------------------------------------------------------
  # Cross-compilation — P0 target matrix
  # ---------------------------------------------------------------------------
  cross:
    name: Cross-compile (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux native
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest

          # Linux cross (aarch64)
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            apt_pkg: gcc-aarch64-linux-gnu

          # macOS native (Apple Silicon)
          - target: aarch64-apple-darwin
            os: macos-latest

          # macOS Intel (cross-compile from Apple Silicon runner)
          - target: x86_64-apple-darwin
            os: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable) + target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: cross-${{ matrix.target }}

      - name: Install cross-linker (Linux aarch64 only)
        if: matrix.apt_pkg != ''
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ${{ matrix.apt_pkg }}

      - name: Configure cross-linker env (Linux aarch64 only)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build (all features) for ${{ matrix.target }}
        run: cargo build --all-features --target ${{ matrix.target }}

  # ---------------------------------------------------------------------------
  # Fuzz — sanity pass with a short time limit on each target
  #
  # Runs on PRs and pushes to master.  The time limit (-max_total_time=30)
  # keeps CI fast while still exercising all four attack surfaces with the
  # seed corpus.  Long-running fuzzing sessions are left to the maintainer
  # via `cargo +nightly fuzz run <target>`.
  # ---------------------------------------------------------------------------
  fuzz:
    name: Fuzz (sanity pass)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: fuzz-nightly
          workspaces: fuzz

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --quiet

      - name: Fuzz — bson_parser (30 s)
        run: >
          cargo +nightly fuzz run bson_parser
          fuzz/corpus/bson_parser
          -- -max_total_time=30

      - name: Fuzz — wire_protocol (30 s)
        run: >
          cargo +nightly fuzz run wire_protocol
          fuzz/corpus/wire_protocol
          -- -max_total_time=30

      - name: Fuzz — query_evaluator (30 s)
        run: >
          cargo +nightly fuzz run query_evaluator
          fuzz/corpus/query_evaluator
          -- -max_total_time=30

      - name: Fuzz — key_encoder (30 s)
        run: >
          cargo +nightly fuzz run key_encoder
          fuzz/corpus/key_encoder
          -- -max_total_time=30

  # ---------------------------------------------------------------------------
  # Crash Recovery — 500 Jepsen-style SIGKILL cycles (hq-ele)
  #
  # Runs 50 cycles × 10 scenarios against the WAL layer.  Each cycle:
  #   1. Sets up a database with pre-committed WAL data
  #   2. Forks a child that performs a scenario-specific write operation
  #   3. SIGKILLs the child at the scenario injection point
  #   4. Validates all five recovery correctness conditions
  #
  # Failure = any of the 500 cycles violates a correctness condition.
  # ---------------------------------------------------------------------------
  crash-recovery:
    name: Crash Recovery (500 cycles)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Crash recovery — 500 cycles, 10 scenarios
        run: cargo test crash_recovery_500_cycles --all-features -- --nocapture

  # ---------------------------------------------------------------------------
  # Security audit — scan dependencies for known vulnerabilities
  # ---------------------------------------------------------------------------
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run cargo audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Cross-platform file format compatibility (x86_64 ↔ aarch64)
  # ---------------------------------------------------------------------------
  #
  # Verifies that a .mqlite file created on one architecture is readable
  # (byte-identical) on the other.  Both directions are tested:
  #
  #   x86_64  write  → aarch64 read
  #   aarch64 write  → x86_64  read
  #
  # The `format_compat` binary writes 100 BSON documents with known content
  # into a minimal .mqlite-structured file, then reads and verifies them.
  # Any native-endian integer I/O would produce a checksum mismatch or a
  # BSON parse error on the reading side.
  compat-write-x86:
    name: Format compat — write (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: compat-x86

      - name: Build format_compat binary
        run: cargo build --release --bin format_compat

      - name: Write compat file
        run: ./target/release/format_compat write compat_x86.mqlite

      - name: Upload compat file artifact
        uses: actions/upload-artifact@v4
        with:
          name: compat-file-x86_64
          path: compat_x86.mqlite
          retention-days: 1

  compat-read-aarch64:
    name: Format compat — read (aarch64, file from x86_64)
    runs-on: ubuntu-24.04-arm
    needs: compat-write-x86
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: compat-aarch64-read

      - name: Build format_compat binary
        run: cargo build --release --bin format_compat

      - name: Download compat file (written by x86_64)
        uses: actions/download-artifact@v4
        with:
          name: compat-file-x86_64

      - name: Verify compat file on aarch64
        run: ./target/release/format_compat read compat_x86.mqlite

  compat-write-aarch64:
    name: Format compat — write (aarch64)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: compat-aarch64-write

      - name: Build format_compat binary
        run: cargo build --release --bin format_compat

      - name: Write compat file
        run: ./target/release/format_compat write compat_aarch64.mqlite

      - name: Upload compat file artifact
        uses: actions/upload-artifact@v4
        with:
          name: compat-file-aarch64
          path: compat_aarch64.mqlite
          retention-days: 1

  compat-read-x86:
    name: Format compat — read (x86_64, file from aarch64)
    runs-on: ubuntu-latest
    needs: compat-write-aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: compat-x86-read

      - name: Build format_compat binary
        run: cargo build --release --bin format_compat

      - name: Download compat file (written by aarch64)
        uses: actions/download-artifact@v4
        with:
          name: compat-file-aarch64

      - name: Verify compat file on x86_64
        run: ./target/release/format_compat read compat_aarch64.mqlite

  # ---------------------------------------------------------------------------
  # Benchmarks — run on PRs, compare vs baseline, flag >2× regression
  # ---------------------------------------------------------------------------
  bench:
    name: Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run criterion benchmarks
        run: cargo bench --all-features 2>&1 | tee /tmp/criterion_raw.txt

      - name: Convert criterion output to bencher format
        # Extracts mean timings from criterion output and reformats them as
        # the bencher "test … bench: X ns/iter (+/- Y)" lines that
        # benchmark-action/github-action-benchmark expects.
        run: |
          python3 - <<'PYEOF'
          import re, sys

          with open('/tmp/criterion_raw.txt') as f:
              content = f.read()

          # Criterion outputs lines like:
          #   bench_name      time:   [1.2000 µs 1.2050 µs 1.2100 µs]
          # We extract the middle (mean) value and convert to ns/iter.
          pattern = re.compile(
              r'^([\w/:]+)\s+time:\s+\[\s*[\d.]+\s*\S+\s+([\d.]+)\s*(\S+)\s+[\d.]+\s*\S+\s*\]',
              re.MULTILINE,
          )

          unit_to_ns = {
              'ps': 1e-3, 'ns': 1, 'µs': 1e3, 'us': 1e3,
              'ms': 1e6, 's': 1e9,
          }

          lines = []
          for m in pattern.finditer(content):
              name = m.group(1).strip()
              value = float(m.group(2))
              unit = m.group(3)
              ns = int(value * unit_to_ns.get(unit, 1))
              lines.append(f'test {name} ... bench: {ns:,} ns/iter (+/- 0)')

          if not lines:
              # Fallback: emit a placeholder so the action doesn't fail on
              # an empty input when no benchmarks matched.
              lines.append('test placeholder ... bench: 0 ns/iter (+/- 0)')
              print('Warning: no criterion output matched; using placeholder', file=sys.stderr)

          output = '\n'.join(lines) + '\n'
          with open('bench_output.txt', 'w') as f:
              f.write(output)
          print(f'Extracted {len(lines)} benchmark(s)')
          for l in lines:
              print(l)
          PYEOF

      - name: Store & compare benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: cargo
          output-file-path: bench_output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Push results to gh-pages so future PRs have a baseline to compare against.
          auto-push: true
          # Post a PR comment showing the benchmark delta.
          comment-always: true
          # Alert (and fail the job) when any benchmark regresses more than 2×.
          comment-on-alert: true
          alert-threshold: "200%"
          fail-on-alert: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench
